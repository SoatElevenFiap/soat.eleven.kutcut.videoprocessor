# ============================================================
# KutCut VideoProcessor — Helm Values
# ============================================================

namespace:
  name: kutcut
  create: false

replicaCount: 1

image:
  repository: acrkutcutpostech.azurecr.io/kutcut/videoprocessor
  tag: latest
  pullPolicy: IfNotPresent

# Configuração não sensível
config:
  rabbitmq:
    host: "rabbitmq-rabbitmq-custom"
    port: "5672"
    queueVideoProcess: "video_uploaded"
    queueVideoProcessCompleted: "processamento_de_videos"
    prefetchCount: "10"
  blobStorage:
    containerName: "videos"

# Integração com Key Vault (Workload Identity)
keyVault:
  enabled: true
  name: ""
  tenantId: ""
  clientId: "" # Managed Identity Client ID

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

service:
  create: false
  type: ClusterIP
  port: 80
  targetPort: 8000

# Probes simplificados para Worker (apenas checa se processo está vivo)
livenessProbe:
  exec:
    command: ["python", "-c", "import sys; sys.exit(0)"]
  initialDelaySeconds: 10
  periodSeconds: 30

serviceAccount:
  create: true
  name: ""

readinessProbe:
  exec:
    command: ["python", "-c", "import sys; sys.exit(0)"]
  initialDelaySeconds: 5
  periodSeconds: 10

networkPolicy:
  enabled: false
  allowedNamespaces:
    - name: kutcut
