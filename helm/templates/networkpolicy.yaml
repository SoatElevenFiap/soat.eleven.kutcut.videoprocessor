{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "videoprocessor.fullname" . }}-network-policy
  namespace: {{ .Values.namespace.name | default "kutcut" }}
  labels:
    {{- include "videoprocessor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "videoprocessor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    {{- range .Values.networkPolicy.allowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .name }}
    {{- end }}
{{- end }}

