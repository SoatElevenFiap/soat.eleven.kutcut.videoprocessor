{{- if .Values.service.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name | default (include "videoprocessor.fullname" .) }}
  namespace: {{ .Values.namespace.name | default "kutcut" }}
  labels:
    {{- include "videoprocessor.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "videoprocessor.selectorLabels" . | nindent 4 }}
{{- end }}

